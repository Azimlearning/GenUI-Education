<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorLah! - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper theme-biology">
        <div class="app-container">
            
            <aside class="sidebar">
                <header class="sidebar-header">
                    <h1>TutorLah!</h1>
                    <p>AI Assistant Chatbot for KSSM Syllabus</p>
                </header>

                <div class="subject-tabs">
                    <button class="tab">Physics</button>
                    <button class="tab">Chemistry</button>
                    <button class="tab active">Biology</button>
                </div>

                <div class="chat-history">
                    <div class="message ai-message">
                        Hello! I'm your SPM Science Tutor. Ask me a question about Biology!
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" placeholder="Type here...">
                        <button class="send-btn">➔</button>
                    </div>
                </div>

                <footer class="user-profile">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <span class="name">Chips Sudikayo</span>
                        <span class="spmyear">SPM 2026</span>
                    </div>
                </footer>
            </aside>

            <main class="visualizer-panel">
                </main>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
